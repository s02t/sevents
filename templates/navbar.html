<script>
function handleNavbarSearch(event) {
  event.preventDefault();
  const searchTerm = document.getElementById('navbar-search').value;
  
  // If we're not on the events page, redirect to it with the search term
  if (!window.location.pathname.includes('/form')) {
    window.location.href = `/form?search=${encodeURIComponent(searchTerm)}`;
    return;
  }
  
  // If we're already on the events page, trigger the search
  const eventSearchInput = document.getElementById('event-search');
  if (eventSearchInput) {
    eventSearchInput.value = searchTerm;
    eventSearchInput.dispatchEvent(new Event('input'));
  }
}
</script>
