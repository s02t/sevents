<!-- {{ forms|length }} forms found -->

{% include 'base.html' %}

<div class="container py-5">
    <div class="modal fade" id="newFormModal" >
        <div class="modal-dialog">
            <div class="modal-content">
                <form action="/form/forms/" method="POST">
                    <div class="modal-header">
                        <h5 class="modal-title">Create New Form</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Form Title</label>
                            <input type="text" name="title" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary">Create Form</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <!-- Form List -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">All Events</h3>
        </div>
        <div class="card-body">
            <a class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#newFormModal">Create New Form</a>
            <div class="list-group">
                {% for form in forms %}
                <div class="list-group-item">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center">
                        <!-- Left Content -->
                        <div class="flex-grow-1 me-md-3" style="min-width: 0;">  <!-- min-width: 0 prevents overflow -->
                            <h5 class="text-truncate">{{ form.title }}</h5>
                            <p class="mb-0 text-break" 
                               style="max-height: 3em; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">
                                {{ form.description }}
                            </p>
                            <small class="text-muted d-block mt-1">
                                Created: {{ form.created_at.strftime('%Y-%m-%d %H:%M') }}
                            </small>
                        </div>
                        
                        <!-- Right Button -->
                        <div class="mt-2 mt-md-0 flex-shrink-0">
                            <a href="/form/forms/{{ form.id }}" class="btn btn-primary btn-sm">
                                View Submissions
                            </a>
                            <a href="/submission/create/{{ form.id }}" class="btn btn-danger btn-sm">
                                Share Link
                            </a>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
