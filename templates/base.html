        .markdown-content {

            margin-bottom: 1rem;

            margin-bottom: 1rem;
        }
        .markdown-content ul, .markdown-content ol {

        .markdown-content blockquote {

            padding-left: 1rem;
            color: #6c757d;
            margin-bottom: 1rem;
        }
        .markdown-content pre, .markdown-content code {
            background-color: #f8f9fa;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-family: SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .markdown-content pre {
            padding: 1rem;
            margin-bottom: 1rem;
            overflow-x: auto;
        }
        .markdown-content img {
            max-width: 100%;
            height: auto;
            margin-bottom: 1rem;
        }
        .markdown-content a {
            color: #0d6efd;
            text-decoration: none;
        }
        .markdown-content a:hover {
            text-decoration: underline;
        }
    </style>
</head>

    <script>
        // Initialize markdown parsing for all markdown-content elements
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.markdown-content').forEach(function(el) {
                if (el.innerHTML) {
                    // Parse markdown content
                    el.innerHTML = marked.parse(el.innerHTML);
                }
            });
        });
    </script>

	<script type="text/javascript">
		function delete_item(id)
		{
			fetch("/item/delete/"+id, {method:'DELETE'})
			.then(response => response.json())
			.then(data => document.getElementById("result").innerHTML = data.message)
		}
	</script>
